services:
  postgres:
    image: postgres:17
    container_name: portfolio-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sameer123
      POSTGRES_DB: portfolio_gpt

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: